<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Router | Multi-Modal Preprocessing</title>
    <meta name="description" content="Test content preprocessing and routing to different AI models based on modality.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="overlay-gradient"></div>
    
    <main class="container">
        <header class="app-header">
            <h1>Model Intelligence Router</h1>
            <p>Smart pre-processing and traffic routing for Text, Audio, and Video modalities.</p>
        </header>

        <section class="card glass-panel" id="input-section">
            <div class="tabs">
                <button class="tab-btn active" data-type="text">Text Query</button>
                <button class="tab-btn" data-type="file">Audio / Video File</button>
            </div>

            <div class="tab-content active" id="content-text">
                <textarea id="text-input" placeholder="Enter your text query here..."></textarea>
            </div>

            <div class="tab-content" id="content-file">
                <div class="file-upload-wrapper">
                    <label for="file-input" class="file-upload-label">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        <span id="file-name-display">Choose an audio or video file</span>
                    </label>
                    <input type="file" id="file-input" accept="audio/*,video/*" />
                </div>
            </div>

            <button id="submit-btn" class="primary-btn">
                <span>Process & Route Query</span>
                <div class="loader hidden" id="btn-loader"></div>
            </button>
        </section>

        <!-- Dynamic Results Section -->
        <section id="results-section" class="hidden">
            <h2 class="results-title">Detected Modality: <span id="detected-modality" class="highlight"></span></h2>
            
            <div class="models-grid" id="models-container">
                <!-- Model responses will strictly map here -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
